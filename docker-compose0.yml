
version: '3.12'

services:
  airflow:
    build: .
    container_name: airflow_dicom

    ports:
      - "8080:8080"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./tests:/opt/airflow/tests

    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - PYTHONPATH=/opt/airflow

    restart: always