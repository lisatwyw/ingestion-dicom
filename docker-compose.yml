services:

  postgres:
    image: postgres:13
    environment:  
      DICOM_DATA_DIR: /opt/airflow/data
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  airflow:
    build: .
    depends_on:
      - postgres
      - redis

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT: 8080
      PYTHONPATH: /opt/airflow/src

      # optional but useful for Codespaces stability
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__FERNET_KEY: "fernet-key-placeholder"

    volumes:
      - ./:/opt/airflow

    ports:
      - "8080:8080"

    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@example.com || true &&
      airflow scheduler & exec airflow webserver"
      
volumes:
  postgres-db-volume: